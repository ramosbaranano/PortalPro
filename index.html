<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>PortalPro</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f5f5f5;
      text-align: center;
    }

    /* TOPO PRETO */
    header {
      background-color: black;
      color: white;
      padding: 20px;
    }

    .foto {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      margin-top: 10px;
      border: 3px solid white;
    }

    .card {
      background: white;
      padding: 20px;
      margin: 30px auto;
      width: 300px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    /* BOTÕES LADO A LADO */
    .botoes {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 10px;
    }

    /* BOTÃO MARROM */
    .btn {
      background-color: #8B4513;
      color: white;
      padding: 10px 15px;
      text-decoration: none;
      border-radius: 5px;
    }

    .btn:hover {
      background-color: #5a2e0c;
    }

    /* INSTAGRAM MARROM */
    .insta {
      background-color: #8B4513;
      color: white;
      padding: 10px 15px;
      text-decoration: none;
      border-radius: 5px;
    }

    .insta:hover {
      background-color: #5a2e0c;
    }

    html {
      scroll-behavior: smooth;
    }

    footer {
      margin-top: 30px;
      padding: 10px;
      background-color: #ddd;
    }
  </style>

</head>
<body>

  <!-- TOPO -->
  <header>
    <h1>PortalPro</h1>

    <!-- FOTO -->
    <img src="https://sl.bing.net/dy9XWEFldFA" class="foto">

    <p>Bem-vindo 👋</p>
  </header>

  <!-- CONTEÚDO PRINCIPAL -->
  <div class="card">
    <h2>PortalPro</h2>

    <p>
      PortalPro é uma plataforma simples e profissional que ajuda a organizar informações, compartilhar projetos e facilitar o uso da tecnologia no trabalho, tornando a apresentação digital mais prática e eficiente.
    </p>

    <!-- BOTÕES -->
    <div class="botoes">
      <a class="btn" href="#">Saiba mais</a>

      <a class="insta" href="https://instagram.com/PortalPro" target="_blank">
        Instagram
      </a>
    </div>
  </div>

  <!-- RODAPÉ -->
  <footer>
    <p>© 2026 PortalPro</p>
  </footer>

</body>
</html>
