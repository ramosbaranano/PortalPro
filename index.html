<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Site private</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f5f5f5;
      text-align: center;
    }

    header {
      background-color: #333;
      color: white;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      margin: 30px auto;
      width: 300px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    .btn {
      display: inline-block;
      margin-top: 10px;
      padding: 10px 15px;
      background-color: #007BFF;
      color: white;
      text-decoration: none;
      border-radius: 5px;
    }

    .btn:hover {
      background-color: #0056b3;
    }

    .insta {
      display: inline-block;
      margin-top: 10px;
      padding: 10px 15px;
      background-color: #E1306C;
      color: white;
      text-decoration: none;
      border-radius: 5px;
    }

    .insta:hover {
      background-color: #c72c5c;
    }

    footer {
      margin-top: 30px;
      padding: 10px;
      background-color: #ddd;
    }
  </style>

</head>
<body>

  <header>
    <h1>Meu Site</h1>
    <p>Bem-vindo 👋</p>
  </header>

  <div class="card">
    <h2></h2>
    <p>Este é meu site pessoal simples.</p>

    <a class="btn" href="#">Saiba mais</a>

    <br><br>

    <!-- TROQUE SEU_USUARIO PELO SEU INSTAGRAM -->
    <a class="insta" href="https://instagram.com/ruannn05_" target="_blank">
      Meu Instagram
    </a>
  </div>

  <footer>
    <p>© 2026 Meu Site</p>
  </footer>

</body>
</html>
